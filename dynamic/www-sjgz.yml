# sjgztea.com / www.sjgztea.com -> Sjgz-Web 静态站点（本机 start.sh 默认 10002）
# 证书：dynamic/tls.yaml 中 sjgztea；须覆盖根域与 www（或通配符 *.sjgztea.com）
# 若宿主机 IP 或端口变更，修改下方 url
#
# 与 NFX-Vault 同源模式一致：前端 VITE_API_URL 为空时请求 /catalog、/auth、/analytics、/image，
# 优先匹配 www-sjgz-api -> Sjgz 后端网关（TRAEFIK_HTTP_PORT，默认 10021）；其余走静态站。

http:
  routers:
    www-sjgz-api:
      rule: (Host(`sjgztea.com`) || Host(`www.sjgztea.com`)) && (PathPrefix(`/catalog`) || PathPrefix(`/auth`) || PathPrefix(`/analytics`) || PathPrefix(`/image`))
      entryPoints:
        - websecure
      service: sjgz-www-api-svc
      tls: {}
      priority: 100

    www-sjgz:
      rule: Host(`sjgztea.com`) || Host(`www.sjgztea.com`)
      entryPoints:
        - websecure
      service: www-sjgz-svc
      tls: {}
      priority: 1

  services:
    sjgz-www-api-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.64:10021"

    www-sjgz-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.64:10002"
