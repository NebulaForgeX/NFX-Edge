# 复制为 www-<sitename>.yml（例如 www-sjgz.yml）并按实际域名/端口修改
# cp dynamic/www.example.yml dynamic/www-<sitename>.yml
#
# 证书：dynamic/tls.yaml 中对应站点；须覆盖根域与 www（或通配符 *.<domain>）
# 若宿主机 IP 或端口变更，修改下方 url
#
# 同源 API：前端 VITE_API_URL 为空时请求 /catalog、/auth、/analytics、/image 等，
# 优先匹配 www-<sitename>-api -> 后端网关；其余走静态站。

http:
  routers:
    www-example-api:
      rule: (Host(`example.com`) || Host(`www.example.com`)) && (PathPrefix(`/catalog`) || PathPrefix(`/auth`) || PathPrefix(`/analytics`) || PathPrefix(`/image`))
      entryPoints:
        - websecure
      service: example-www-api-svc
      tls: {}
      priority: 100

    www-example:
      rule: Host(`example.com`) || Host(`www.example.com`)
      entryPoints:
        - websecure
      service: www-example-svc
      tls: {}
      priority: 1

  services:
    example-www-api-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:<backend-port>"

    www-example-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:<www-static-port>"
