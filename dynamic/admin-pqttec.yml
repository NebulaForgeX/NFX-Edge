# admin.pqttec.com -> Pqttec-Admin 静态站点（本机 start.sh 映射口，默认 10003）
# 证书：dynamic/tls.yaml 中 pqttec；须覆盖 admin.pqttec.com（或通配符 *.pqttec.com）
# 若宿主机 IP 或端口变更，修改下方 url
#
# 同源 API：Admin 请求 /catalog、/content、/auth、/analytics、/image → 优先走 admin-pqttec-api -> 后端 10031

http:
  routers:
    admin-pqttec-api:
      rule: Host(`admin.pqttec.com`) && (PathPrefix(`/catalog`) || PathPrefix(`/content`) || PathPrefix(`/auth`) || PathPrefix(`/analytics`) || PathPrefix(`/image`))
      entryPoints:
        - websecure
      service: pqttec-admin-api-svc
      tls: {}
      priority: 100

    admin-pqttec:
      rule: Host(`admin.pqttec.com`)
      entryPoints:
        - websecure
      service: admin-pqttec-svc
      tls: {}
      priority: 1

  services:
    pqttec-admin-api-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.64:10031"

    admin-pqttec-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.64:10003"
