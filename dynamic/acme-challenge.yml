# ACME HTTP-01 挑战转发配置
# 将 ACME 挑战请求转发到 NFX-Vault 后端（固定宿主机端口，与部署方式无关）
#
# 约定：Vault 无论 dev-api.sh 还是 Docker，都占用宿主机 BACKEND_PORT（默认 10151）
#   - dev-api.sh：uvicorn --host 0.0.0.0 --port 10151
#   - Docker：compose 映射 ${BACKEND_HOST}:${BACKEND_PORT}:8000 → 宿主机 10151
# NFX-Edge 只认 host.docker.internal:10151，切换 Vault 部署方式时无需改本文件。
# docker-compose.yml 须含 extra_hosts: host.docker.internal:host-gateway（Linux/NAS）

http:
  routers:
    acme-challenge:
      # 挑战只看路径即可，避免 Host 规则引入额外变量
      rule: "PathPrefix(`/.well-known/acme-challenge/`)"
      entryPoints:
        - web
      service: acme-challenge-service
      priority: 100 # 高于普通业务路由即可，无需极端值
      # 不设置 tls，因为这是 HTTP-01 挑战，必须使用 HTTP (80端口)

  services:
    acme-challenge-service:
      loadBalancer:
        servers:
          # 固定宿主机端口；dev-api.sh 与 Docker 后端均映射到此口，勿改为容器名
          - url: "http://host.docker.internal:10151"
        passHostHeader: true
