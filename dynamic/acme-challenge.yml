# ACME HTTP-01 挑战转发配置
# 将 ACME 挑战请求转发到 Certs 服务
# 注意：此配置会匹配所有域名的 /.well-known/acme-challenge 路径

http:
  routers:
    acme-challenge:
      # 挑战只看路径即可，避免 Host 规则引入额外变量
      rule: "PathPrefix(`/.well-known/acme-challenge/`)"
      entryPoints:
        - web
      service: acme-challenge-service
      priority: 100 # 高于普通业务路由即可，无需极端值
      # 不设置 tls，因为这是 HTTP-01 挑战，必须使用 HTTP (80端口)

  services:
    acme-challenge-service:
      loadBalancer:
        servers:
          # 与 NFX-Vault docker-compose 中服务名 backend-api 一致（同 nfx-edge 网络可解析）
          - url: "http://backend-api:8000"
        passHostHeader: true
