# Docker Compose 服务定义示例（与当前可用配置保持一致）
# 使用方法：复制此文件为 docker-compose.yml，然后按实际路径/域名调整
services:
  traefik:
    image: traefik:v3.6
    container_name: NFX-Edge-Reverse-Proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nfx-edge
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CERTS_DIR}:/certs/websites:ro
      - ./dynamic:/dynamic:ro
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.web.http.redirections.entrypoint.priority=1
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.constraints=Label(`nfx.project`,`nfx-edge`)
      - --providers.docker.network=nfx-edge
      - --api.dashboard=true
      - --api.insecure=false
      - --log.level=INFO
      - --accesslog=true
      - --accesslog.format=json
      - --metrics.prometheus=true
    labels:
      - traefik.enable=true
      - nfx.project=nfx-edge
      - traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_HOST}`)
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.tls=true
      - traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$2y$$05$$KymEIDjaRPneTxHf1RCzruglmhsOdj2KQJhG6qKAUbtFkG0kCVJ/e
      - traefik.http.routers.dashboard.middlewares=dashboard-auth@docker

  site1_www:
    image: nginx:alpine
    container_name: NFX-Edge-WWW-SITE1
    restart: unless-stopped
    networks:
      - nfx-edge
    volumes:
      - ${SITE1_WWW_DIR}:/usr/share/nginx/html:ro
      - ${NGINX_CONFIG_FILE}:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - nfx.project=nfx-edge
      - traefik.http.routers.site1-www.rule=Host(`${SITE1_DOMAIN}`) || Host(`www.${SITE1_DOMAIN}`)
      - traefik.http.routers.site1-www.entrypoints=websecure
      - traefik.http.routers.site1-www.tls=true

  site1_admin:
    image: nginx:alpine
    container_name: NFX-Edge-ADMIN-SITE1
    restart: unless-stopped
    networks:
      - nfx-edge
    volumes:
      - ${SITE1_ADMIN_DIR}:/usr/share/nginx/html:ro
      - ${NGINX_CONFIG_FILE}:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - nfx.project=nfx-edge
      - traefik.http.routers.site1-admin.rule=Host(`admin.${SITE1_DOMAIN}`)
      - traefik.http.routers.site1-admin.entrypoints=websecure
      - traefik.http.routers.site1-admin.tls=true

  site2_www:
    image: nginx:alpine
    container_name: NFX-Edge-WWW-SITE2
    restart: unless-stopped
    networks:
      - nfx-edge
    volumes:
      - ${SITE2_WWW_DIR}:/usr/share/nginx/html:ro
      - ${NGINX_CONFIG_FILE}:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - nfx.project=nfx-edge
      - traefik.http.routers.site2-www.rule=Host(`${SITE2_DOMAIN}`) || Host(`www.${SITE2_DOMAIN}`)
      - traefik.http.routers.site2-www.entrypoints=websecure
      - traefik.http.routers.site2-www.tls=true

networks:
  nfx-edge:
    name: nfx-edge
    driver: bridge
